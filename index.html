      margin: 0 auto;
      padding: 2rem 1rem;

      font-size: 0.95rem;
    }

    header p + p {
      margin-top: 0.25rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    figure {
      display: flex;
      flex-direction: column;
      margin: 0 auto;
    }

    figure.portrait {
      max-width: 525px;
    }

    figure img {
      width: 100%;
      height: auto;
      display: block;
    }

    figcaption {

      margin-top: 0.5rem;
      font-size: 0.85rem;
